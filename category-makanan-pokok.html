<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Makanan Pokok & Bumbu - D-Market</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="container">
        <div class="logo">
          <a href="index.html"
            ><img src="img/logo.png" alt="D-Market Logo"
          /></a>
        </div>
        <nav class="menu">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="categories.html">Categories</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <section class="category-products">
      <div class="container">
        <h2 class="text-center">Makanan Pokok & Bumbu</h2>
        <div class="grid-4">
          <div class="product-item">
            <img src="img/food/sania_beras.jpg" alt="Sania Beras Premium" />
            <h4>Sania Beras Premium</h4>
            <p>Rp 50.000</p>
          </div>
          <div class="product-item">
            <img src="img/food/boncabe.jpg" alt="Boncabe" />
            <h4>Boncabe</h4>
            <p>Rp 10.000</p>
          </div>
          <div class="product-item">
            <img src="img/food/garam.jpg" alt="Garam" />
            <h4>Garam</h4>
            <p>Rp 5.000</p>
          </div>
          <div class="product-item">
            <img src="img/food/gulaku.jpg" alt="Gulaku Premium" />
            <h4>Gulaku Premium</h4>
            <p>Rp 15.000</p>
          </div>
          <div class="product-item">
            <img src="img/food/bango.jpg" alt="Bango" />
            <h4>Bango</h4>
            <p>Rp 12.000</p>
          </div>
          <div class="product-item">
            <img
              src="img/food/greenfields_cheese.jpg"
              alt="Greenfields Mozzarella"
            />
            <h4>Greenfields Mozzarella Cheese</h4>
            <p>Rp 25.000</p>
          </div>
          <div class="product-item">
            <img src="img/food/kapal_api.jpg" alt="Kapal Api" />
            <h4>Kapal Api</h4>
            <p>Rp 18.000</p>
          </div>
          <div class="product-item">
            <img src="img/food/ladaku.jpg" alt="Ladaku" />
            <h4>Ladaku</h4>
            <p>Rp 10.000</p>
          </div>
          <div class="product-item">
            <img src="img/food/masako.jpg" alt="Masako" />
            <h4>Masako</h4>
            <p>Rp 8.000</p>
          </div>
          <!-- Tambahkan sisa produk lainnya sesuai daftar -->
        </div>
      </div>
    </section>
  </body>
</html>
